    <style>
        :root {
            --bg-base: #030303;
            --grid-color: rgba(255, 255, 255, 0.04);
            --text-main: #f4f4f4;
            --text-dim: #555555;
            --accent: #ff003c;
            /* Subtle hostile takeover red */
        }

        body,
        html {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            background-color: var(--bg-base);

            /* Structural infrastructure grid */
            background-image:
                linear-gradient(var(--grid-color) 1px, transparent 1px),
                linear-gradient(90deg, var(--grid-color) 1px, transparent 1px);
            background-size: 30px 30px;
            background-position: center center;

            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'JetBrains Mono', monospace;
            color: var(--text-main);
            user-select: none;
        }

        /* Scanline overlay for that raw data dump feel */
        body::after {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: linear-gradient(to bottom,
                    rgba(255, 255, 255, 0),
                    rgba(255, 255, 255, 0) 50%,
                    rgba(0, 0, 0, 0.1) 50%,
                    rgba(0, 0, 0, 0.1));
            background-size: 100% 4px;
            pointer-events: none;
            opacity: 0.12;
            z-index: 10;
        }

        #page {
            transition: opacity 180ms ease-out, transform 180ms ease-in;
            z-index: 2;
        }

        /* The structural frame */
        .plate {
            position: relative;
            padding-left: 20px;
            border-left: 2px solid var(--text-dim);
            transition: border-color 0.2s;
        }

        .plate.hostile {
            border-left-color: var(--accent);
        }

        h1#line {
            font-size: clamp(1.2rem, 3.5vw, 2.5rem);
            font-weight: 700;
            margin: 0;
            letter-spacing: -0.02em;
            white-space: nowrap;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.1);
        }

        .submark {
            font-size: 0.65rem;
            letter-spacing: 0.4em;
            text-transform: uppercase;
            color: var(--text-dim);
            margin-top: 8px;
            font-weight: 400;
        }

        /* Glitching state modifiers */
        #line.glitching {
            color: var(--text-dim);
        }

        .char-locked {
            color: var(--text-main);
        }

        /* The exit animation before redirect */
        .exit {
            opacity: 0;
            transform: scale(0.98);
        }
    </style>

<body>

    <main id="page">
        <section class="plate" aria-live="polite" id="main-plate">
            <h1 id="line">Only the story matters</h1>
            <div class="submark">PixelStortion / System.Init</div>
        </section>
    </main>

    <script>
        const target = "https://www.pixelstortion.com/zones/silence/";
        const first = "Only the story matters";
        const second = "And who controls the Narrative";

        const line = document.getElementById("line");
        const page = document.getElementById("page");
        const plate = document.getElementById("main-plate");
        const submark = document.querySelector(".submark");

        const glyphs = "█▓▒░/\\|<>[]{}—_+=*#@$%&?";
        const sleep = ms => new Promise(resolve => setTimeout(resolve, ms));

        function scrambleTo(text, frames = 13) {
            line.classList.add("glitching");
            plate.classList.add("hostile"); // Trigger the structural visual shift
            submark.textContent = "PixelStortion / Override.Exe"; // Shift the submark narrative

            let frame = 0;

            return new Promise(resolve => {
                const tick = () => {
                    // Calculate how many characters are locked in based on frame progress
                    const locked = Math.floor((frame / frames) * text.length);

                    const output = text
                        .split("")
                        .map((char, i) => {
                            if (char === " ") return " ";
                            if (i < locked) {
                                // Locked characters return to bright white
                                return `<span class="char-locked">${char}</span>`;
                            }
                            // Scrambling characters use the dark grey glyphs
                            return glyphs[Math.floor(Math.random() * glyphs.length)];
                        })
                        .join("");

                    line.innerHTML = output;
                    frame++;

                    if (frame <= frames) {
                        setTimeout(tick, 34); // Fast, aggressive rewrite
                    } else {
                        // Ensure final clean state
                        line.innerHTML = text;
                        line.classList.remove("glitching");
                        plate.classList.remove("hostile");
                        resolve();
                    }
                };
                tick();
            });
        }

        async function run() {
            // Initial state
            line.innerHTML = first;

            // Read phase 1
            await sleep(800);

            // Execute the system override scramble
            await scrambleTo(second, 18);

            // Read phase 2 (Mathmatical precision achieved)
            await sleep(900);

            // Trigger visual exit
            page.classList.add("exit");

            // Wait for exit animation to finish before redirecting
            await sleep(200);
            window.location.assign(target);
        }

        // Start sequence when ready
        window.addEventListener("load", run, { once: true });
    </script>
